<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Electronics Deals in India - Shop Electronics Online | ShopDeal</title>
    <meta name="description" content="Find best electronics deals on mobiles, laptops, headphones, smartwatches. Save up to 50% on top brands like Apple, Samsung, Sony, boAt.">
    <meta name="keywords" content="electronics deals, mobile phones, laptops, headphones, smartwatches, best electronics India">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .page-header h1 { font-size: 32px; margin-bottom: 10px; }
        .products-grid {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        @media (max-width: 640px) {
            .products-grid { grid-template-columns: 1fr; }
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .product-card:hover { transform: translateY(-4px); }
        .product-img { height: 200px; display: flex; align-items: center; justify-content: center; padding: 20px; background: #f8f8f8; }
        .product-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-info { padding: 15px; }
        .product-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .price { margin-bottom: 8px; }
        .current-price { font-size: 20px; font-weight: bold; color: #ff6b35; }
        .old-price { font-size: 13px; color: #999; text-decoration: line-through; margin-left: 8px; }
        .discount { background: #e8f5e9; color: #4caf50; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 8px; }
        .shop-btn { width: 100%; padding: 10px; background: #ff6b35; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="nav">
            <a href="/" class="logo">🛍️ ShopDeal India</a>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search products...">
                <button onclick="searchProducts()">🔍</button>
            </div>
            <div class="cart-icon" onclick="showCart()">🛒 <span class="cart-count" id="cartCount">0</span></div>
        </div>
    </header>

    <div class="page-header">

        <p>Save up to 50% on Mobiles, Laptops, Headphones & more</p>
    </div>

    <div class="products-grid" id="productsGrid"></div>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-col"><h4>ShopDeal India</h4><p>India's best deal aggregator</p></div>
            <div class="footer-col"><h4>Quick Links</h4><a href="/electronics.html">Electronics</a><a href="/fashion.html">Fashion</a><a href="/beauty.html">Beauty</a></div>
            <div class="footer-col"><h4>Contact</h4><p>📞 9773747761</p><p>💬 WhatsApp</p></div>
        </div>
        <div class="copyright"><p>© 2024 ShopDeal India | Powered by Cuelinks</p></div>
    </footer>

    <div class="whatsapp-float" onclick="startWhatsApp()">

    </div>

    <script>
        const electronicsProducts = [
            { name: 'Apple iPhone 15 (128GB)', price: 71999, mrp: 79900, discount: '10%', img: 'https://images.unsplash.com/photo-1591337676887-a217a6970a8a?w=300&h=300&fit=crop', link: 'https://www.amazon.in/dp/B0CHWNPS5R' },
            { name: 'Samsung Galaxy S24 5G', price: 79999, mrp: 89999, discount: '11%', img: 'https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?w=300&h=300&fit=crop', link: 'https://www.amazon.in/dp/B0CNL6TG8K' },
            { name: 'Apple MacBook Air M2', price: 89990, mrp: 99900, discount: '10%', img: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=300&h=300&fit=crop', link: 'https://www.apple.com/in/shop/buy-mac/macbook-air' },
            { name: 'Sony WH-1000XM5', price: 29990, mrp: 34990, discount: '14%', img: 'https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=300&h=300&fit=crop', link: 'https://www.sony.co.in/electronics/headband-headphones/wh-1000xm5' },
            { name: 'boAt Rockerz 450', price: 1799, mrp: 2999, discount: '40%', img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&h=300&fit=crop', link: 'https://www.boat-lifestyle.com/products/rockerz-450' },
            { name: 'OnePlus 12 5G', price: 64999, mrp: 69999, discount: '7%', img: 'https://images.unsplash.com/photo-1586953208448-b95a79798f07?w=300&h=300&fit=crop', link: 'https://www.amazon.in/dp/B0CQHGRL9Q' },
            { name: 'Google Pixel 7a', price: 43999, mrp: 49999, discount: '12%', img: 'https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=300&h=300&fit=crop', link: 'https://www.amazon.in/dp/B0C1L5H5G9' },
            { name: 'JBL Tune 510BT', price: 3999, mrp: 5999, discount: '33%', img: 'https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=300&h=300&fit=crop', link: 'https://www.amazon.in/dp/B08G3Z3L5V' }
        ];

        let cart = localStorage.getItem('shop_cart') ? parseInt(localStorage.getItem('shop_cart')) : 0;
        document.getElementById('cartCount').innerText = cart;

        function redirectToStore(link) {
            cart++; localStorage.setItem('shop_cart', cart); document.getElementById('cartCount').innerText = cart;
            window.open(link, '_blank');
        }

        function renderProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = electronicsProducts.map(p => `
                <div class="product-card" onclick="redirectToStore('${p.link}')">
                    <div class="product-img"><img src="${p.img}" alt="${p.name}"></div>
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="price"><span class="current-price">₹${p.price.toLocaleString()}</span><span class="old-price">₹${p.mrp.toLocaleString()}</span><span class="discount">-${p.discount}</span></div>
                        <button class="shop-btn" onclick="event.stopPropagation(); redirectToStore('${p.link}')">Shop Now →</button>
                    </div>
                </div>
            `).join('');
        }

        function showCart() { alert(`🛒 Cart: ${cart} items`); }
        function startWhatsApp() { window.open('https://wa.me/919773747761', '_blank'); }
        function searchProducts() { window.location.href = '/'; }

        renderProducts();
    </script>
</body>
